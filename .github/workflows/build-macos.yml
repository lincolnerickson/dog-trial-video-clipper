name: Build macOS app

# Builds the self-contained "Dog Trial Video Clipper.app" on GitHub's macOS
# runner (Apple Silicon only -- GitHub retired the free Intel macos-13 image,
# so an x86_64 leg would queue forever) and uploads it as a downloadable zip.
# Trigger it by hand (Actions tab -> Run workflow) or by pushing a tag like
# v1.0.0.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # so a tagged build can publish a GitHub Release

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Unit tests (shared core, no display needed)
        run: python tests/test_core.py

      - name: Build the .app
        run: pyinstaller --noconfirm packaging/Dog_Trial_Video_Clipper.spec

      - name: Smoke-test the frozen app (headless)
        continue-on-error: true
        run: |
          python - <<'PY'
          import imageio_ffmpeg, subprocess
          ff = imageio_ffmpeg.get_ffmpeg_exe()
          subprocess.run(
              [ff, "-y", "-f", "lavfi",
               "-i", "testsrc=size=640x360:rate=30:duration=3",
               "-pix_fmt", "yuv420p", "selftest.mp4"],
              check=True,
          )
          PY
          APP="dist/Dog Trial Video Clipper.app/Contents/MacOS/Dog Trial Video Clipper"
          QT_QPA_PLATFORM=offscreen "$APP" --selftest "$PWD/selftest.mp4"

      - name: Zip the .app (ditto preserves bundle symlinks + metadata)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent \
            "Dog Trial Video Clipper.app" \
            "../DogTrialVideoClipper-macOS-${{ matrix.arch }}.zip"

      - name: Upload the app
        uses: actions/upload-artifact@v4
        with:
          name: DogTrialVideoClipper-macOS-${{ matrix.arch }}
          path: DogTrialVideoClipper-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Publish to the GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="DogTrialVideoClipper-macOS-${{ matrix.arch }}.zip"
          # First arch to finish creates the release; the other appends its asset.
          # (--clobber on upload makes re-runs idempotent.)
          gh release create "$TAG" \
            --title "Dog Trial Video Clipper $TAG (macOS)" \
            --notes-file packaging/RELEASE_NOTES.md \
            "$ZIP" \
          || gh release upload "$TAG" "$ZIP" --clobber
